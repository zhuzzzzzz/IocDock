- name: Refresh SSH host keys
  hosts: all
  gather_facts: false
  tasks:
  - name: Refresh host key on control node
    delegate_to: localhost
    throttle: 1 
    shell: |
      echo "Running as user: $(whoami)"
      echo "HOME is: $HOME"
      echo "known_hosts path: $HOME/.ssh/known_hosts"

      mkdir -p "$HOME/.ssh"
      touch "$HOME/.ssh/known_hosts"
      ssh-keygen -f "$HOME/.ssh/known_hosts" -R "{{ ansible_ssh_host }}"
      ssh-keyscan -H {{ ansible_ssh_host }} >> "$HOME/.ssh/known_hosts"
    changed_when: false
    register: refresh_result

  - name: Show refresh result
    delegate_to: localhost
    debug:
      msg: "{{ refresh_result.stdout_lines }}"

- name: Install custom CA on Ubuntu
  hosts: all
  become: true
  gather_facts: true
  any_errors_fatal: true
  vars:
    ca_cert_path: ../certs/root/
    ca_cert_name: iasf.crt
    ansible_ssh_user: root
    ansible_ssh_host_key_checking: false
  tasks:

  - name: Install certificate on Debian/Ubuntu systems
    block:
    - name: Copy to trusted certificates directory
      copy:
        src: "{{ ca_cert_path }}/{{ ca_cert_name }}"
        dest: "/usr/local/share/ca-certificates/{{ ca_cert_name }}"
        owner: root
        group: root
        mode: '0644'
      register: cert_copy
    - name: Update CA certificates database
      command: flock /var/lock/ca-cert.lock update-ca-certificates
      when: cert_copy.changed    
      changed_when: cert_copy.changed     
    - name: Verify certificate installation
      shell: openssl verify -CAfile /etc/ssl/certs/ca-certificates.crt "/usr/local/share/ca-certificates/{{ ca_cert_name }}"
      changed_when: false
    when: ansible_facts['os_family'] == 'Debian'
    
  - name: Install certificate on RHEL/CentOS/Fedora systems
    block:
    - name: Copy to trusted anchors directory
      copy:
        src: "{{ temp_cert_dir }}/{{ ca_cert_name }}"
        dest: "/etc/pki/ca-trust/source/anchors/{{ ca_cert_name }}"
        owner: root
        group: root
        mode: '0644'
      register: cert_copy
    - name: Update CA trust store
      command: flock /var/lock/ca-trust.lock update-ca-trust extract
      when: cert_copy.changed
      changed_when: cert_copy.changed
    - name: Verify certificate installation
      command: openssl verify -CAfile /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem "/etc/pki/ca-trust/source/anchors/{{ ca_cert_name }}"
      changed_when: false
    when: ansible_facts['os_family'] == 'RedHat'
