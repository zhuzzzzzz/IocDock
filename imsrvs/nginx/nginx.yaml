services:
  srv-nginx:
    image: registry.iasf/nginx:1.28
    labels:
      service-type: local
      prometheus-job: nginx
    ports:
    - target: 443
      published: 443
      mode: host
    - target: 80
      published: 80
      mode: host
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 1G
      placement:
        constraints:
        - node.platform.os==linux
        - node.labels.nginx==true
    volumes:
    - source: ./config/nginx.conf
      target: /etc/nginx/nginx.conf
      type: bind
      read_only: true
    - source: ./config/conf.d
      target: /etc/nginx/conf.d
      type: bind
      read_only: true
    - source: ./certs
      target: /etc/nginx/certs
      type: bind
      read_only: true
    - source: /etc/localtime
      target: /etc/localtime
      type: bind
      read_only: true
