networks:
  hostnet:
    external: true
    name: host
services:
  srv-dbwr:
    image: registry.iasf/dbwr:0.0.1
    labels:
      service-type: local
      prometheus-job: dbwr
    networks:
    - hostnet
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 1G
      placement:
        constraints:
        - node.platform.os==linux
        - node.labels.dbwr==true
    volumes:
    - source: /etc/localtime
      target: /etc/localtime
      type: bind
      read_only: true
    - source: /etc/hostname
      target: /etc/hostname
      type: bind
      read_only: true
    - source: ./opi
      target: /opi
      type: bind
      read_only: true
    - source: ./setenv.sh
      target: /usr/local/tomcat/bin/setenv.sh
      type: bind
      read_only: true
